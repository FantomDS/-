<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russian Scholar - Поиск научных статей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/scholar.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-book"></i> Russian Scholar
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-8 mx-auto text-center">
                <h1 class="display-4 mb-3">Russian Scholar</h1>
                <p class="lead text-muted mb-4">Поиск научных статей на русском языке</p>
                
                <form action="/search" method="GET" class="mb-4">
                    <div class="input-group input-group-lg">
                        <input type="text" name="q" class="form-control" 
                               placeholder="Поиск статей, авторов, ключевых слов..." 
                               autocomplete="off" autofocus>
                        <button class="btn btn-primary" type="submit">
                            <i class="bi bi-search"></i> Поиск
                        </button>
                    </div>
                </form>
                
                <div class="stats mt-4">
                    <span class="badge bg-light text-dark me-2">
                        <i class="bi bi-database"></i> {{ stats.total_articles }} статей
                    </span>
                    <span class="badge bg-light text-dark me-2">
                        <i class="bi bi-people"></i> {{ stats.total_authors }} авторов
                    </span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
